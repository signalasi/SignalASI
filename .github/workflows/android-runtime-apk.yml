name: Android Runtime APK

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/android-runtime-apk.yml
      - apps/android/app/build.gradle.kts
      - apps/android/app/src/main/java/com/signalasi/chat/AgentRuntimePackCatalog.kt
      - apps/android/app/src/main/res/raw/signalasi_runtime_trust_anchors.json
      - apps/android/runtime/**
      - tools/runtime/**
      - package.json
  workflow_dispatch:
    inputs:
      production:
        description: Require the persistent production runtime signing certificate
        required: true
        type: boolean
        default: false
      publish_catalog:
        description: Publish the signed software catalog and packs to GitHub Release
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: android-runtime-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-runtime-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      RUNTIME_SIGNING_CERTIFICATE: ${{ secrets.RUNTIME_SIGNING_CERTIFICATE }}
      RUNTIME_SIGNING_PRIVATE_KEY: ${{ secrets.RUNTIME_SIGNING_PRIVATE_KEY }}
      RUNTIME_RELEASE_TAG: android-runtime-v1
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Install runtime build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            bc bison build-essential cpio file flex libelf-dev libncurses-dev libssl-dev \
            llvm make openssl patchelf python3 rsync squashfs-tools unzip wget xz-utils

      - name: Prepare runtime signing identity
        env:
          REQUIRE_PRODUCTION: ${{ inputs.production }}
          PUBLISH_CATALOG: ${{ inputs.publish_catalog }}
        run: |
          mkdir -p build/runtime/signing
          if [[ -n "$RUNTIME_SIGNING_CERTIFICATE" && -n "$RUNTIME_SIGNING_PRIVATE_KEY" ]]; then
            printf '%s\n' "$RUNTIME_SIGNING_CERTIFICATE" > build/runtime/signing/runtime-cert.pem
            printf '%s\n' "$RUNTIME_SIGNING_PRIVATE_KEY" > build/runtime/signing/runtime-key.pem
          elif [[ "$REQUIRE_PRODUCTION" == "true" || "$PUBLISH_CATALOG" == "true" ]]; then
            echo "Persistent runtime signing secrets are required for production or catalog publication." >&2
            exit 2
          else
            openssl req -x509 -newkey rsa:3072 -nodes -days 7 \
              -subj "/CN=SignalASI Android Runtime Development/" \
              -keyout build/runtime/signing/runtime-key.pem \
              -out build/runtime/signing/runtime-cert.pem
          fi
          node tools/runtime/print-runtime-trust-anchor.mjs \
            --certificate build/runtime/signing/runtime-cert.pem

      - name: Restore optional runtime download cache
        uses: actions/cache@v4
        with:
          path: build/runtime/downloads
          key: android-runtime-inputs-v2-${{ runner.os }}-${{ hashFiles('tools/runtime/build-*-image.sh', 'tools/runtime/runtime-download.sh') }}
          restore-keys: |
            android-runtime-inputs-v2-${{ runner.os }}-
            android-runtime-inputs-v1-${{ runner.os }}-

      - name: Restore optional software image cache
        id: optional-images-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            build/runtime/release/node-js-*.img
            build/runtime/release/node-js-*.img.config.json
            build/runtime/release/go-*.img
            build/runtime/release/go-*.img.config.json
            build/runtime/release/cpp-zig-*.img
            build/runtime/release/cpp-zig-*.img.config.json
            build/runtime/release/rust-*.img
            build/runtime/release/rust-*.img.config.json
            build/runtime/release/java-*.img
            build/runtime/release/java-*.img.config.json
            build/runtime/release/ffmpeg-*.img
            build/runtime/release/ffmpeg-*.img.config.json
          key: android-runtime-software-images-v1-${{ runner.os }}-${{ hashFiles('tools/runtime/build-node-js-image.sh', 'tools/runtime/build-go-image.sh', 'tools/runtime/build-cpp-image.sh', 'tools/runtime/build-rust-image.sh', 'tools/runtime/build-java-image.sh', 'tools/runtime/build-ffmpeg-image.sh', 'tools/runtime/runtime-download.sh', 'tools/runtime/runtime-image.mjs', 'tools/runtime/build-runtime-image.mjs') }}

      - name: Inspect restored optional software images
        id: optional-images-state
        run: |
          required=(
            build/runtime/release/node-js-24.18.0-arm64-v8a.img
            build/runtime/release/node-js-24.18.0-arm64-v8a.img.config.json
            build/runtime/release/go-1.26.5-arm64-v8a.img
            build/runtime/release/go-1.26.5-arm64-v8a.img.config.json
            build/runtime/release/cpp-zig-0.16.0-arm64-v8a.img
            build/runtime/release/cpp-zig-0.16.0-arm64-v8a.img.config.json
            build/runtime/release/rust-1.97.1-arm64-v8a.img
            build/runtime/release/rust-1.97.1-arm64-v8a.img.config.json
            build/runtime/release/java-25.0.3_9-arm64-v8a.img
            build/runtime/release/java-25.0.3_9-arm64-v8a.img.config.json
            build/runtime/release/ffmpeg-8.1.2-arm64-v8a.img
            build/runtime/release/ffmpeg-8.1.2-arm64-v8a.img.config.json
          )
          ready=true
          for path in "${required[@]}"; do
            [[ -s "$path" ]] || ready=false
          done
          echo "ready=$ready" >> "$GITHUB_OUTPUT"

      - name: Build optional software images
        if: steps.optional-images-state.outputs.ready != 'true'
        run: |
          run_pack() {
            local label="$1"
            shift
            local log_file
            log_file="$(mktemp)"
            set +e
            "$@" 2>&1 | tee "$log_file"
            local status="${PIPESTATUS[0]}"
            set -e
            if [[ "$status" -ne 0 ]]; then
              local summary
              summary="$(tail -n 12 "$log_file" | tr '\r\n' '  ' | sed 's/%/%25/g')"
              echo "::error title=$label runtime build failed::$summary"
              rm -f "$log_file"
              return "$status"
            fi
            rm -f "$log_file"
          }
          run_pack "Node.js" npm run runtime:build-node-js
          run_pack "Go" npm run runtime:build-go
          run_pack "C and C++" npm run runtime:build-cpp
          run_pack "Rust" npm run runtime:build-rust
          run_pack "Java" npm run runtime:build-java
          run_pack "FFmpeg" npm run runtime:build-ffmpeg

      - name: Save optional software image cache
        if: steps.optional-images-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            build/runtime/release/node-js-*.img
            build/runtime/release/node-js-*.img.config.json
            build/runtime/release/go-*.img
            build/runtime/release/go-*.img.config.json
            build/runtime/release/cpp-zig-*.img
            build/runtime/release/cpp-zig-*.img.config.json
            build/runtime/release/rust-*.img
            build/runtime/release/rust-*.img.config.json
            build/runtime/release/java-*.img
            build/runtime/release/java-*.img.config.json
            build/runtime/release/ffmpeg-*.img
            build/runtime/release/ffmpeg-*.img.config.json
          key: ${{ steps.optional-images-cache.outputs.cache-primary-key }}

      - name: Restore Android QEMU engine cache
        id: qemu-cache
        uses: actions/cache@v4
        with:
          path: |
            build/runtime/android-jni-libs
            build/runtime/android-assets/runtime/qemu
          key: android-qemu-v2-${{ runner.os }}-${{ hashFiles('tools/runtime/build-android-qemu.sh', 'tools/runtime/android-elf-*.mjs', 'tools/runtime/collect-android-elf-bundle.mjs', 'tools/runtime/normalize-android-elf-bundle.mjs', 'apps/android/runtime/qemu/**') }}
          restore-keys: |
            android-qemu-v2-${{ runner.os }}-

      - name: Inspect restored Android QEMU engine
        id: qemu-state
        run: |
          if [[ -f build/runtime/android-jni-libs/signalasi-qemu-bundle.json && \
                -f build/runtime/android-jni-libs/arm64-v8a/libsignalasi_qemu.so && \
                -f build/runtime/android-assets/runtime/qemu/bundle.json ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Android QEMU engine
        if: steps.qemu-state.outputs.ready != 'true'
        run: npm run runtime:build-android-qemu

      - name: Normalize Android QEMU APK libraries
        run: |
          npm run runtime:normalize-android-qemu -- \
            --jni-root build/runtime/android-jni-libs \
            --asset-root build/runtime/android-assets

      - name: Verify normalized Android QEMU ELF bundle
        run: |
          npm run runtime:verify-android-qemu-elf -- \
            --jni-root build/runtime/android-jni-libs \
            --readelf llvm-readelf

      - name: Upload normalized Android QEMU bundle
        uses: actions/upload-artifact@v4
        with:
          name: SignalASI-Android-qemu-${{ github.sha }}
          retention-days: 7
          if-no-files-found: error
          compression-level: 0
          path: |
            build/runtime/android-jni-libs
            build/runtime/android-assets/runtime/qemu

      - name: Restore default runtime image cache
        id: default-images-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            build/runtime/release/linux-base-1.0.0-arm64-v8a.img
            build/runtime/release/linux-base-1.0.0-arm64-v8a.img.config.json
            build/runtime/release/python-uv-0.11.29-arm64-v8a.img
            build/runtime/release/python-uv-0.11.29-arm64-v8a.img.config.json
          key: android-default-runtime-images-v1-${{ runner.os }}-${{ hashFiles('tools/runtime/build-linux-base.sh', 'tools/runtime/build-python-uv-image.sh', 'tools/runtime/runtime-download.sh', 'tools/runtime/runtime-image.mjs', 'tools/runtime/build-runtime-image.mjs', 'apps/android/runtime/buildroot-external/**') }}

      - name: Inspect restored default runtime images
        id: default-images-state
        run: |
          if [[ -s build/runtime/release/linux-base-1.0.0-arm64-v8a.img && \
                -s build/runtime/release/linux-base-1.0.0-arm64-v8a.img.config.json && \
                -s build/runtime/release/python-uv-0.11.29-arm64-v8a.img && \
                -s build/runtime/release/python-uv-0.11.29-arm64-v8a.img.config.json ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build default Linux and Python images
        if: steps.default-images-state.outputs.ready != 'true'
        run: |
          mkdir -p build/runtime/release
          npm run runtime:build-linux-base -- "$PWD/build/runtime/release/linux-base-1.0.0-arm64-v8a.img"
          npm run runtime:build-python-uv -- "$PWD/build/runtime/release/python-uv-0.11.29-arm64-v8a.img"
          node --input-type=module <<'NODE'
          import { statSync, writeFileSync } from 'node:fs';
          const image = 'linux-base-1.0.0-arm64-v8a.img';
          const path = `build/runtime/release/${image}`;
          writeFileSync(`${path}.config.json`, `${JSON.stringify({
            id: 'linux-base',
            version: '1.0.0',
            architecture: 'arm64-v8a',
            image,
            image_file: image,
            capabilities: ['shell.execute'],
            dependencies: [],
            installed_size_bytes: statSync(path).size + 1024 * 1024,
            license: 'GPL-2.0-only AND GPL-2.0-or-later AND LGPL-2.1-or-later',
            minimum_host_version_code: 69,
            guest_api_version: 1,
            release_notes: 'Bundled SignalASI Linux base environment'
          }, null, 2)}\n`);
          NODE

      - name: Save default runtime image cache
        if: steps.default-images-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            build/runtime/release/linux-base-1.0.0-arm64-v8a.img
            build/runtime/release/linux-base-1.0.0-arm64-v8a.img.config.json
            build/runtime/release/python-uv-0.11.29-arm64-v8a.img
            build/runtime/release/python-uv-0.11.29-arm64-v8a.img.config.json
          key: ${{ steps.default-images-cache.outputs.cache-primary-key }}

      - name: Sign all runtime and software packs
        run: |
          shopt -s nullglob
          configs=(build/runtime/release/*.img.config.json)
          if [[ ${#configs[@]} -ne 8 ]]; then
            echo "Expected exactly eight runtime image configurations; found ${#configs[@]}." >&2
            exit 2
          fi
          for config in "${configs[@]}"; do
            output="${config%.img.config.json}.sarpack"
            npm run runtime:build-pack -- \
              --config "$config" \
              --output "$output" \
              --certificate build/runtime/signing/runtime-cert.pem \
              --key build/runtime/signing/runtime-key.pem
          done

      - name: Prepare APK default runtime assets
        run: |
          npm run runtime:prepare-android-defaults -- \
            --asset-root build/runtime/android-assets \
            --jni-root build/runtime/android-jni-libs \
            --certificate build/runtime/signing/runtime-cert.pem \
            --pack build/runtime/release/linux-base-1.0.0-arm64-v8a.sarpack \
            --pack build/runtime/release/python-uv-0.11.29-arm64-v8a.sarpack

      - name: Build signed software catalog
        run: |
          npm run runtime:build-catalog -- \
            --entries build/runtime/release \
            --output build/runtime/release/android-runtime-catalog-v1.json \
            --base-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RUNTIME_RELEASE_TAG}/" \
            --version 1.0.0 \
            --expires-days 365 \
            --certificate build/runtime/signing/runtime-cert.pem \
            --key build/runtime/signing/runtime-key.pem \
            --trust-anchors build/runtime/android-assets/runtime/bootstrap/trust-anchors.json

      - name: Publish signed software catalog
        if: >-
          (github.event_name == 'workflow_dispatch' && inputs.publish_catalog) ||
          (github.event_name == 'push' && env.RUNTIME_SIGNING_CERTIFICATE != '' && env.RUNTIME_SIGNING_PRIVATE_KEY != '')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RUNTIME_RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RUNTIME_RELEASE_TAG" \
              build/runtime/release/android-runtime-catalog-v1.json \
              build/runtime/release/*.sarpack \
              --clobber \
              --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RUNTIME_RELEASE_TAG" \
              build/runtime/release/android-runtime-catalog-v1.json \
              build/runtime/release/*.sarpack \
              --title "SignalASI Android Runtime v1" \
              --notes "Signed Android runtime and software catalog." \
              --repo "$GITHUB_REPOSITORY"
          fi

      - name: Build bundled APK
        working-directory: apps/android
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" "build-tools;36.0.0" "platform-tools"
          ./gradlew :app:assembleDebug -Psignalasi.requireEmbeddedRuntime=true --no-daemon

      - name: Verify APK runtime contents
        run: |
          rm -rf build/runtime/apk-audit
          mkdir -p build/runtime/apk-audit
          unzip -q apps/android/app/build/outputs/apk/debug/app-debug.apk \
            -d build/runtime/apk-audit
          cp build/runtime/android-jni-libs/signalasi-qemu-bundle.json \
            build/runtime/apk-audit/lib/signalasi-qemu-bundle.json
          npm run runtime:verify-android-defaults -- \
            --asset-root build/runtime/apk-audit/assets \
            --jni-root build/runtime/apk-audit/lib
          npm run runtime:verify-android-qemu-elf -- \
            --jni-root build/runtime/apk-audit/lib \
            --readelf llvm-readelf
          unzip -l apps/android/app/build/outputs/apk/debug/app-debug.apk | \
            grep -E 'libsignalasi_qemu.so|runtime/bootstrap/.+\.sarpack|runtime/bootstrap/index.json'

      - uses: actions/upload-artifact@v4
        with:
          name: SignalASI-Android-runtime-${{ github.sha }}
          retention-days: 14
          if-no-files-found: error
          path: |
            apps/android/app/build/outputs/apk/debug/app-debug.apk
            build/runtime/release/android-runtime-catalog-v1.json
            build/runtime/release/*.sarpack
            build/runtime/release/*.sarpack.metadata.json
            build/runtime/android-jni-libs/signalasi-qemu-bundle.json
            build/runtime/android-assets/runtime/bootstrap/index.json
