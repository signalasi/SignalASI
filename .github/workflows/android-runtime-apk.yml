name: Android Runtime APK

on:
  workflow_dispatch:
    inputs:
      production:
        description: Require the persistent production runtime signing certificate
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-runtime-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      RUNTIME_SIGNING_CERTIFICATE: ${{ secrets.RUNTIME_SIGNING_CERTIFICATE }}
      RUNTIME_SIGNING_PRIVATE_KEY: ${{ secrets.RUNTIME_SIGNING_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Install runtime build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            bc bison build-essential cpio file flex libelf-dev libncurses-dev libssl-dev \
            llvm make openssl patchelf python3 rsync squashfs-tools unzip wget xz-utils

      - name: Prepare runtime signing identity
        env:
          REQUIRE_PRODUCTION: ${{ inputs.production }}
        run: |
          mkdir -p build/runtime/signing
          if [[ -n "$RUNTIME_SIGNING_CERTIFICATE" && -n "$RUNTIME_SIGNING_PRIVATE_KEY" ]]; then
            printf '%s\n' "$RUNTIME_SIGNING_CERTIFICATE" > build/runtime/signing/runtime-cert.pem
            printf '%s\n' "$RUNTIME_SIGNING_PRIVATE_KEY" > build/runtime/signing/runtime-key.pem
          elif [[ "$REQUIRE_PRODUCTION" == "true" ]]; then
            echo "Production runtime signing secrets are required." >&2
            exit 2
          else
            openssl req -x509 -newkey rsa:3072 -nodes -days 7 \
              -subj "/CN=SignalASI Android Runtime Development/" \
              -keyout build/runtime/signing/runtime-key.pem \
              -out build/runtime/signing/runtime-cert.pem
          fi
          node tools/runtime/print-runtime-trust-anchor.mjs \
            --certificate build/runtime/signing/runtime-cert.pem

      - name: Restore Android QEMU engine cache
        id: qemu-cache
        uses: actions/cache@v4
        with:
          path: |
            build/runtime/android-jni-libs
            build/runtime/android-assets/runtime/qemu
          key: android-qemu-${{ runner.os }}-${{ hashFiles('tools/runtime/build-android-qemu.sh', 'apps/android/runtime/qemu/**') }}
          restore-keys: |
            android-qemu-${{ runner.os }}-

      - name: Build Android QEMU engine
        if: steps.qemu-cache.outputs.cache-hit != 'true'
        run: npm run runtime:build-android-qemu

      - name: Normalize Android QEMU APK libraries
        run: |
          npm run runtime:normalize-android-qemu -- \
            --jni-root build/runtime/android-jni-libs \
            --asset-root build/runtime/android-assets

      - name: Build default Linux and Python images
        run: |
          mkdir -p build/runtime/release
          npm run runtime:build-linux-base -- "$PWD/build/runtime/release/linux-base-1.0.0-arm64-v8a.img"
          npm run runtime:build-python-uv -- "$PWD/build/runtime/release/python-uv-0.11.29-arm64-v8a.img"
          node --input-type=module <<'NODE'
          import { statSync, writeFileSync } from 'node:fs';
          const image = 'linux-base-1.0.0-arm64-v8a.img';
          const path = `build/runtime/release/${image}`;
          writeFileSync(`${path}.config.json`, `${JSON.stringify({
            id: 'linux-base',
            version: '1.0.0',
            architecture: 'arm64-v8a',
            image,
            image_file: image,
            capabilities: ['shell.execute'],
            dependencies: [],
            installed_size_bytes: statSync(path).size + 1024 * 1024,
            license: 'GPL-2.0-only AND GPL-2.0-or-later AND LGPL-2.1-or-later',
            minimum_host_version_code: 68,
            guest_api_version: 1,
            release_notes: 'Bundled SignalASI Linux base environment'
          }, null, 2)}\n`);
          NODE

      - name: Sign default runtime packs
        run: |
          npm run runtime:build-pack -- \
            --config build/runtime/release/linux-base-1.0.0-arm64-v8a.img.config.json \
            --output build/runtime/release/linux-base-1.0.0-arm64-v8a.sarpack \
            --certificate build/runtime/signing/runtime-cert.pem \
            --key build/runtime/signing/runtime-key.pem
          npm run runtime:build-pack -- \
            --config build/runtime/release/python-uv-0.11.29-arm64-v8a.img.config.json \
            --output build/runtime/release/python-uv-0.11.29-arm64-v8a.sarpack \
            --certificate build/runtime/signing/runtime-cert.pem \
            --key build/runtime/signing/runtime-key.pem

      - name: Prepare APK default runtime assets
        run: |
          npm run runtime:prepare-android-defaults -- \
            --asset-root build/runtime/android-assets \
            --jni-root build/runtime/android-jni-libs \
            --certificate build/runtime/signing/runtime-cert.pem \
            --pack build/runtime/release/linux-base-1.0.0-arm64-v8a.sarpack \
            --pack build/runtime/release/python-uv-0.11.29-arm64-v8a.sarpack

      - name: Build bundled APK
        working-directory: apps/android
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" "build-tools;36.0.0" "platform-tools"
          ./gradlew :app:assembleDebug -Psignalasi.requireEmbeddedRuntime=true --no-daemon

      - name: Verify APK runtime contents
        run: |
          npm run runtime:verify-android-defaults -- \
            --asset-root build/runtime/android-assets \
            --jni-root build/runtime/android-jni-libs
          unzip -l apps/android/app/build/outputs/apk/debug/app-debug.apk | \
            grep -E 'libsignalasi_qemu.so|runtime/bootstrap/.+\.sarpack|runtime/bootstrap/index.json'

      - uses: actions/upload-artifact@v4
        with:
          name: SignalASI-Android-runtime-${{ github.sha }}
          retention-days: 14
          if-no-files-found: error
          path: |
            apps/android/app/build/outputs/apk/debug/app-debug.apk
            build/runtime/release/*.sarpack.metadata.json
            build/runtime/android-jni-libs/signalasi-qemu-bundle.json
            build/runtime/android-assets/runtime/bootstrap/index.json
